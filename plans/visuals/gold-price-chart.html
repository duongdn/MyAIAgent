let chart = null;

function renderChart(period) {
  const d = DATA[period];
  const ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: d.labels,
      datasets: [
        {
          label: 'Bán ra',
          data: d.sell,
          borderColor: '#f87171',
          backgroundColor: 'rgba(248,113,113,0.08)',
          borderWidth: 2,
          pointRadius: d.labels.length > 60 ? 0 : 3,
          tension: 0.3,
          fill: false,
        },
        {
          label: 'Mua vào',
          data: d.buy,
          borderColor: '#22c55e',
          backgroundColor: 'rgba(34,197,94,0.08)',
          borderWidth: 2,
          pointRadius: d.labels.length > 60 ? 0 : 3,
          tension: 0.3,
          fill: false,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#ccc', font: { size: 13 } } },
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2a2d3a',
          borderWidth: 1,
          titleColor: '#ffd700',
          bodyColor: '#ccc',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('vi-VN')} nghìn đ`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#666', maxTicksLimit: 10, maxRotation: 0 },
          grid: { color: '#1e2030' },

        y: {
          ticks: {
            color: '#666',
            callback: v => v.toLocaleString('vi-VN')
          },
          grid: { color: '#1e2030' },
        }
      }
    }
  });
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderChart(tab.dataset.period);
  });
});
